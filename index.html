<!DOCTYPE html>
<html lang="en" class="h-full" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniCode — Multi-LLM Coding Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="h-full bg-[var(--bg-primary)] text-[var(--text-primary)] flex flex-col transition-colors duration-300">

  <!-- Top Bar -->
  <header class="flex items-center justify-between px-4 py-2 bg-[var(--bg-secondary)] border-b border-[var(--border)] shrink-0">
    <div class="flex items-center gap-2">
      <span class="text-xl font-bold text-[var(--accent)] tracking-tight">&lt;/&gt;</span>
      <h1 class="text-lg font-semibold text-[var(--text-primary)]">OmniCode</h1>
      <span class="text-xs text-[var(--text-muted)] ml-1">Multi-LLM Coding Assistant</span>
    </div>
    <div class="flex items-center gap-3">
      <select id="modelSelect" class="bg-[var(--bg-input)] border border-[var(--border)] text-sm rounded-lg px-3 py-1.5 text-[var(--text-primary)] focus:outline-none focus:border-[var(--accent)] cursor-pointer">
        <option disabled selected>Loading models...</option>
      </select>
      <button id="previewToggleBtn" class="text-[var(--text-muted)] hover:text-[var(--accent)] transition-colors hidden" title="Toggle Preview">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
      </button>
      <button id="themeBtn" class="text-[var(--text-muted)] hover:text-[var(--accent)] transition-colors" title="Toggle theme">
        <svg id="themeIconDark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg id="themeIconLight" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
      <button id="settingsBtn" class="text-[var(--text-muted)] hover:text-[var(--accent)] transition-colors" title="API Settings">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
      <button id="newChatBtn" class="text-[var(--text-muted)] hover:text-[var(--accent)] transition-colors" title="New Chat">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
      </button>
      <!-- Auth: Login button or User avatar -->
      <button id="loginBtn" class="flex items-center gap-1.5 text-xs text-[var(--text-muted)] hover:text-[var(--accent)] transition-colors bg-[var(--bg-input)] border border-[var(--border)] rounded-lg px-2.5 py-1.5" title="Sign in with Google">
        <svg class="w-4 h-4" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in
      </button>
      <div id="userMenu" class="hidden relative">
        <button id="userAvatarBtn" class="w-8 h-8 rounded-full overflow-hidden border-2 border-[var(--border)] hover:border-[var(--accent)] transition-colors" title="Account">
          <img id="userAvatar" class="w-full h-full object-cover" src="" alt="avatar">
        </button>
        <div id="userDropdown" class="hidden absolute right-0 top-full mt-2 bg-[var(--bg-secondary)] border border-[var(--border)] rounded-xl p-2 min-w-[200px] z-50 shadow-lg">
          <div class="px-3 py-2 border-b border-[var(--border)]">
            <p id="userName" class="text-sm font-medium text-[var(--text-primary)] truncate"></p>
            <p id="userEmail" class="text-xs text-[var(--text-muted)] truncate"></p>
          </div>
          <button id="logoutBtn" class="w-full text-left px-3 py-2 text-sm text-red-400 hover:bg-[var(--bg-input)] rounded-lg transition-colors mt-1">Sign out</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Settings Panel -->
  <div id="settingsPanel" class="hidden bg-[var(--bg-secondary)] border-b border-[var(--border)] px-4 py-3 shrink-0">
    <div class="max-w-3xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-3">
      <div>
        <label class="block text-xs text-[var(--text-muted)] mb-1">API Key</label>
        <input id="apiKeyInput" type="password" placeholder="sk-..."
               class="w-full bg-[var(--bg-input)] border border-[var(--border)] rounded-lg px-3 py-1.5 text-sm text-[var(--text-primary)] focus:outline-none focus:border-[var(--accent)]">
      </div>
      <div>
        <label class="block text-xs text-[var(--text-muted)] mb-1">Custom API Base (optional)</label>
        <input id="apiBaseInput" type="text" placeholder="https://api.openai.com/v1"
               class="w-full bg-[var(--bg-input)] border border-[var(--border)] rounded-lg px-3 py-1.5 text-sm text-[var(--text-primary)] focus:outline-none focus:border-[var(--accent)]">
      </div>
      <div>
        <label class="block text-xs text-[var(--text-muted)] mb-1">Temperature</label>
        <input id="tempInput" type="range" min="0" max="2" step="0.1" value="0.7"
               class="w-full mt-1 accent-[var(--accent)]">
        <span id="tempValue" class="text-xs text-[var(--text-muted)]">0.7</span>
      </div>
      <div>
        <label class="block text-xs text-[var(--text-muted)] mb-1">Google Client ID</label>
        <input id="googleClientIdInput" type="text" placeholder="xxxx.apps.googleusercontent.com"
               class="w-full bg-[var(--bg-input)] border border-[var(--border)] rounded-lg px-3 py-1.5 text-sm text-[var(--text-primary)] focus:outline-none focus:border-[var(--accent)]">
      </div>
    </div>
    <div class="flex justify-end mt-2">
      <button id="saveSettingsBtn" class="bg-[var(--accent)] hover:opacity-80 text-white text-sm px-4 py-1.5 rounded-lg transition-colors">
        Save
      </button>
    </div>
  </div>

  <!-- Main Content: Chat + Preview Split -->
  <div id="mainContent" class="flex-1 flex overflow-hidden">
    <!-- Chat Panel -->
    <div id="chatPanel" class="flex-1 flex flex-col overflow-hidden transition-all duration-300">
      <main id="chatArea" class="flex-1 overflow-y-auto px-4 py-6">
        <div id="messageContainer" class="max-w-3xl mx-auto space-y-4">
          <div class="text-center py-12">
            <div class="text-5xl mb-4">&lt;/&gt;</div>
            <h2 class="text-2xl font-bold text-[var(--text-primary)] mb-2">Welcome to OmniCode</h2>
            <p class="text-[var(--text-muted)] mb-6">Your multi-LLM coding assistant. Select a model, configure your API key, and start building.</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 max-w-xl mx-auto text-sm">
              <button onclick="insertPrompt('Build a complete todo app with HTML, CSS and JavaScript. Include add, delete, mark complete, filter by status, and local storage persistence.')"
                      class="bg-[var(--bg-input)]/50 border border-[var(--border)] rounded-xl p-3 text-[var(--text-secondary)] hover:border-[var(--accent)]/50 hover:text-[var(--accent)] transition-all">
                Build a todo app
              </button>
              <button onclick="insertPrompt('Create a Snake game with HTML Canvas. Include score tracking, game over screen, and restart button.')"
                      class="bg-[var(--bg-input)]/50 border border-[var(--border)] rounded-xl p-3 text-[var(--text-secondary)] hover:border-[var(--accent)]/50 hover:text-[var(--accent)] transition-all">
                Build a Snake game
              </button>
              <button onclick="insertPrompt('Debug this code and explain the fix:')"
                      class="bg-[var(--bg-input)]/50 border border-[var(--border)] rounded-xl p-3 text-[var(--text-secondary)] hover:border-[var(--accent)]/50 hover:text-[var(--accent)] transition-all">
                Debug my code
              </button>
            </div>
          </div>
        </div>
      </main>

      <!-- Input Area -->
      <footer class="shrink-0 bg-[var(--bg-secondary)] border-t border-[var(--border)] px-4 py-3">
        <div class="max-w-3xl mx-auto">
          <!-- Image preview strip -->
          <div id="imagePreviewStrip" class="hidden flex gap-2 mb-2 flex-wrap"></div>
          <div class="flex gap-2 items-end">
            <div class="flex-1 relative">
              <textarea id="chatInput"
                        rows="1"
                        placeholder="Ask me to code anything... Paste images with Ctrl+V (Enter to send, Shift+Enter for newline)"
                        class="w-full bg-[var(--bg-input)] border border-[var(--border)] rounded-xl px-4 py-3 pr-20 text-sm text-[var(--text-primary)] resize-none focus:outline-none focus:border-[var(--accent)] max-h-40 overflow-y-auto"></textarea>
              <!-- Image upload button -->
              <button id="imageUploadBtn" class="absolute right-10 bottom-2 text-[var(--text-muted)] hover:text-[var(--accent)] transition-colors" title="Upload image">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
              </button>
              <input type="file" id="imageFileInput" accept="image/*" class="hidden" multiple>
              <button id="stopBtn" class="hidden absolute right-2 bottom-2 bg-red-600 hover:bg-red-500 text-white rounded-lg p-1.5 transition-colors" title="Stop generation">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
              </button>
            </div>
            <button id="sendBtn" class="bg-[var(--accent)] hover:opacity-80 disabled:bg-gray-700 disabled:text-gray-500 text-white rounded-xl px-4 py-3 text-sm font-medium transition-colors flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
              </svg>
              Send
            </button>
          </div>
          <div class="flex justify-between mt-1">
            <span id="statusText" class="text-xs text-[var(--text-muted)]">Ready</span>
            <span id="tokenInfo" class="text-xs text-[var(--text-muted)]"></span>
          </div>
        </div>
      </footer>
    </div>

    <!-- Preview Panel -->
    <div id="previewPanel" class="hidden flex-col border-l border-[var(--border)] bg-[var(--bg-primary)]" style="width:50%">
      <div class="flex items-center justify-between px-3 py-2 bg-[var(--bg-secondary)] border-b border-[var(--border)]">
        <div class="flex items-center gap-2">
          <span class="text-xs font-medium text-[var(--text-muted)]">LIVE PREVIEW</span>
          <span id="previewFileName" class="text-xs text-[var(--accent)] hidden"></span>
        </div>
        <div class="flex items-center gap-2">
          <button id="previewRefreshBtn" class="text-[var(--text-muted)] hover:text-[var(--accent)] transition-colors" title="Refresh preview">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
          </button>
          <button id="previewCloseBtn" class="text-[var(--text-muted)] hover:text-red-400 transition-colors" title="Close preview">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>
      <iframe id="previewFrame" class="flex-1 w-full bg-white" sandbox="allow-scripts allow-same-origin" title="Live Preview"></iframe>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
