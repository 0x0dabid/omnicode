<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniCode — Multi-LLM Coding Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
</head>
<body class="h-full bg-gray-950 text-gray-100 flex flex-col">

  <!-- Top Bar -->
  <header class="flex items-center justify-between px-4 py-2 bg-gray-900 border-b border-gray-800 shrink-0">
    <div class="flex items-center gap-2">
      <span class="text-xl font-bold text-emerald-400 tracking-tight">&lt;/&gt;</span>
      <h1 class="text-lg font-semibold text-white">OmniCode</h1>
      <span class="text-xs text-gray-500 ml-1">Multi-LLM Coding Assistant</span>
    </div>
    <div class="flex items-center gap-3">
      <!-- Model Selector -->
      <select id="modelSelect" class="bg-gray-800 border border-gray-700 text-sm rounded-lg px-3 py-1.5 text-gray-200 focus:outline-none focus:border-emerald-500 cursor-pointer">
        <option disabled selected>Loading models...</option>
      </select>
      <!-- Settings toggle -->
      <button id="settingsBtn" class="text-gray-400 hover:text-emerald-400 transition-colors" title="API Settings">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
      <!-- New Chat -->
      <button id="newChatBtn" class="text-gray-400 hover:text-emerald-400 transition-colors" title="New Chat">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Settings Panel (hidden by default) -->
  <div id="settingsPanel" class="hidden bg-gray-900 border-b border-gray-800 px-4 py-3 shrink-0">
    <div class="max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-3">
      <div>
        <label class="block text-xs text-gray-400 mb-1">API Key</label>
        <input id="apiKeyInput" type="password" placeholder="sk-..."
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-200 focus:outline-none focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Custom API Base (optional)</label>
        <input id="apiBaseInput" type="text" placeholder="https://api.openai.com/v1"
               class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-gray-200 focus:outline-none focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-xs text-gray-400 mb-1">Temperature</label>
        <input id="tempInput" type="range" min="0" max="2" step="0.1" value="0.7"
               class="w-full mt-1 accent-emerald-500">
        <span id="tempValue" class="text-xs text-gray-500">0.7</span>
      </div>
    </div>
    <div class="flex justify-end mt-2">
      <button id="saveSettingsBtn" class="bg-emerald-600 hover:bg-emerald-500 text-sm px-4 py-1.5 rounded-lg transition-colors">
        Save
      </button>
    </div>
  </div>

  <!-- Chat Area -->
  <main id="chatArea" class="flex-1 overflow-y-auto px-4 py-6">
    <div id="messageContainer" class="max-w-3xl mx-auto space-y-4">
      <!-- Welcome message -->
      <div class="text-center py-12">
        <div class="text-5xl mb-4">&lt;/&gt;</div>
        <h2 class="text-2xl font-bold text-white mb-2">Welcome to OmniCode</h2>
        <p class="text-gray-400 mb-6">Your multi-LLM coding assistant. Select a model, configure your API key, and start building.</p>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 max-w-xl mx-auto text-sm">
          <button onclick="insertPrompt('Write a Python Flask REST API with CRUD operations')"
                  class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-3 text-gray-300 hover:border-emerald-500/50 hover:text-emerald-400 transition-all">
            Write a Flask REST API
          </button>
          <button onclick="insertPrompt('Debug this code and explain the fix:')"
                  class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-3 text-gray-300 hover:border-emerald-500/50 hover:text-emerald-400 transition-all">
            Debug my code
          </button>
          <button onclick="insertPrompt('Explain how async/await works in JavaScript')"
                  class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-3 text-gray-300 hover:border-emerald-500/50 hover:text-emerald-400 transition-all">
            Explain a concept
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Input Area -->
  <footer class="shrink-0 bg-gray-900 border-t border-gray-800 px-4 py-3">
    <div class="max-w-3xl mx-auto">
      <div class="flex gap-2 items-end">
        <div class="flex-1 relative">
          <textarea id="chatInput"
                    rows="1"
                    placeholder="Ask me to code anything... (Enter to send, Shift+Enter for newline)"
                    class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 pr-12 text-sm text-gray-200 resize-none focus:outline-none focus:border-emerald-500 max-h-40 overflow-y-auto"></textarea>
          <button id="stopBtn" class="hidden absolute right-2 bottom-2 bg-red-600 hover:bg-red-500 text-white rounded-lg p-1.5 transition-colors" title="Stop generation">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
          </button>
        </div>
        <button id="sendBtn" class="bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-700 disabled:text-gray-500 text-white rounded-xl px-4 py-3 text-sm font-medium transition-colors flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
          Send
        </button>
      </div>
      <div class="flex justify-between mt-1">
        <span id="statusText" class="text-xs text-gray-600">Ready</span>
        <span id="tokenInfo" class="text-xs text-gray-600"></span>
      </div>
    </div>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
